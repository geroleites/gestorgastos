<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1A1442">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nomo">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Nomo — Finanzas Personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js';document.head.appendChild(s);"></script>
<style>
:root{
  --ink:#15123A;
  --ink-light:#332B6B;
  --ink-soft:#6C4CFF;
  --paper:#F3F4FA;
  --paper-soft:#ECEDF7;
  --paper-card:#FFFFFF;
  --brass:#6C4CFF;
  --brass-soft:#EAE4FF;
  --expense:#FF4D6D;
  --income:#12C892;
  --text:#15123A;
  --text-muted:#6E7191;
  --line:rgba(21,18,58,.08);
  --line-strong:rgba(21,18,58,.13);
  --shadow:0 1px 2px rgba(21,18,58,.04),0 10px 26px rgba(21,18,58,.07);
  --radius:18px;
  --hero-grad:linear-gradient(135deg,#1A1442 0%,#3B2A8C 55%,#6C4CFF 100%);
  --font-display:'Space Grotesk',sans-serif;
  --font-sans:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--text);
  font-family:var(--font-sans);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--brass-soft);}

@keyframes fadeInUp{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
@keyframes popIn{ from{ opacity:0; transform:scale(.96); } to{ opacity:1; transform:scale(1); } }

#app{display:flex;min-height:100vh;}

/* ---------- Sidebar (desktop) ---------- */
.sidebar{
  display:none;
  width:240px;
  flex-shrink:0;
  background:var(--hero-grad);
  color:#fff;
  padding:30px 18px;
  flex-direction:column;
  gap:4px;
}
.sidebar .brand{
  font-family:var(--font-display);
  font-size:21px;
  font-weight:700;
  letter-spacing:-.01em;
  margin:0 6px 28px 6px;
  display:flex;align-items:center;gap:10px;
}
.brand .mark{
  width:32px;height:32px;border-radius:10px;
  background:rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#fff;font-family:var(--font-display);font-weight:700;
}
.sidebar .nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:13px;
  color:rgba(255,255,255,.62);
  font-size:14.5px;font-weight:600;
  border:none;background:transparent;text-align:left;width:100%;
  transition:background .18s, color .18s, transform .12s;
}
.sidebar .nav-item svg{flex-shrink:0;opacity:.9;}
.sidebar .nav-item.active{background:rgba(255,255,255,.16);color:#fff;}
.sidebar .nav-item:hover{background:rgba(255,255,255,.09);color:#fff;}
.sidebar .nav-item:active{transform:scale(.98);}
.sidebar .spacer{flex:1;}
.sidebar .nav-foot{font-size:11.5px;color:rgba(255,255,255,.38);padding:0 14px;line-height:1.5;}

/* ---------- Main column ---------- */
.main-col{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 8px 20px;
}
.topbar .greet{font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:-.01em;}
.topbar .date{font-size:12.5px;color:var(--text-muted);margin-top:2px;text-transform:capitalize;}
.topbar .mobile-brand{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--ink);}
.topbar .mobile-brand .mark{width:28px;height:28px;border-radius:9px;background:var(--hero-grad);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700;}
.icon-btn{
  width:40px;height:40px;border-radius:13px;border:1px solid var(--line-strong);
  background:var(--paper-card);display:flex;align-items:center;justify-content:center;
  color:var(--ink);transition:background .15s, transform .12s;
}
.icon-btn:active{transform:scale(.94);background:var(--paper-soft);}

#view-root{flex:1;padding:6px 18px 112px 18px;max-width:880px;width:100%;margin:0 auto;}
@media(min-width:640px){#view-root{padding:6px 28px 60px 28px;}}

.section-title{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:-.01em;margin:24px 0 12px 2px;color:var(--ink);}
.section-title:first-child{margin-top:8px;}

/* ---------- Cards ---------- */
.card{
  background:var(--paper-card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  animation:fadeInUp .32s ease both;
}
.card + .card{margin-top:12px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.grid-2{grid-template-columns:1fr;}}

.stat-card{padding:18px 20px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);font-weight:700;}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);}
.stat-row:first-of-type{border-top:none;padding-top:0;}
.stat-amount{font-family:var(--font-mono);font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.stat-amount.neg{color:var(--expense);}
.stat-currency{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);}

/* Hero treatment for the first stat card (Patrimonio) on Resumen */
.grid-2 .stat-card:first-child{
  background:var(--hero-grad);
  border:none;
  position:relative;
  overflow:hidden;
  color:#fff;
}
.grid-2 .stat-card:first-child::before{
  content:'';position:absolute;top:-60px;right:-50px;width:170px;height:170px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.16) 0%,rgba(255,255,255,0) 70%);
}
.grid-2 .stat-card:first-child::after{
  content:'';position:absolute;bottom:-70px;left:-40px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(108,76,255,.45) 0%,rgba(108,76,255,0) 70%);
}
.grid-2 .stat-card:first-child .stat-label{color:rgba(255,255,255,.62);position:relative;}
.grid-2 .stat-card:first-child .stat-row{border-top-color:rgba(255,255,255,.16);position:relative;}
.grid-2 .stat-card:first-child .stat-amount{color:#fff;}
.grid-2 .stat-card:first-child .stat-currency{color:rgba(255,255,255,.55);}

.quick-actions{display:flex;gap:10px;margin-top:14px;}
.qa-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:14px 6px;border-radius:16px;border:1px solid var(--line);
  background:var(--paper-card);color:var(--ink);font-size:12px;font-weight:700;
  box-shadow:var(--shadow);transition:transform .12s, background .15s;
}
.qa-btn svg{color:var(--brass);}
.qa-btn:active{background:var(--brass-soft);transform:scale(.96);}

/* ---------- ledger rows (movements) ---------- */
.ledger-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 2px;border-bottom:1px solid var(--line);
}
.ledger-row:last-child{border-bottom:none;}
.stamp{
  width:40px;height:40px;border-radius:13px;flex-shrink:0;
  background:color-mix(in srgb, currentColor 14%, white);
  border:none;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:14px;
}
.ledger-main{flex:1;min-width:0;}
.ledger-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ledger-sub{font-size:12px;color:var(--text-muted);margin-top:1px;}
.ledger-amount{font-family:var(--font-mono);font-weight:700;font-size:14.5px;text-align:right;white-space:nowrap;letter-spacing:-.01em;}
.ledger-amount.neg{color:var(--expense);}
.ledger-amount.pos{color:var(--income);}
.ledger-row .row-del{margin-left:6px;color:var(--text-muted);background:none;border:none;padding:6px;border-radius:8px;}
.ledger-row .row-del:active{background:var(--paper-soft);}

.empty-state{
  text-align:center;padding:44px 18px;color:var(--text-muted);
}
.empty-state .e-icon{margin-bottom:12px;color:var(--brass);}
.empty-state .e-title{font-family:var(--font-display);font-size:17px;color:var(--ink);font-weight:700;margin-bottom:5px;}
.empty-state .e-sub{font-size:13px;margin-bottom:18px;line-height:1.5;}

/* ---------- chips / filters ---------- */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px 2px;-ms-overflow-style:none;scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;padding:7px 14px;border-radius:999px;border:1px solid var(--line-strong);
  background:var(--paper-card);font-size:12.5px;font-weight:700;color:var(--ink-light);white-space:nowrap;
}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.cat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}

select.filter-select{
  padding:9px 12px;border-radius:12px;border:1px solid var(--line-strong);background:var(--paper-card);
  font-size:12.5px;color:var(--text);font-weight:600;
}
.filters-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}

.total-banner{
  display:flex;justify-content:space-between;align-items:center;
  background:var(--hero-grad);color:#fff;border-radius:16px;padding:16px 18px;margin-bottom:14px;
}
.total-banner .tb-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;opacity:.65;}
.total-banner .tb-amount{font-family:var(--font-mono);font-size:21px;font-weight:700;color:#fff;margin-top:3px;letter-spacing:-.01em;}

/* ---------- account cards ---------- */
.acc-card{
  background:var(--paper-card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);margin-bottom:12px;animation:fadeInUp .32s ease both;
}
.acc-card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.acc-name{font-weight:700;font-size:15px;color:var(--ink);}
.acc-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.acc-balance{font-family:var(--font-mono);font-size:21px;font-weight:700;text-align:right;letter-spacing:-.01em;}
.acc-actions{display:flex;gap:8px;margin-top:14px;}
.btn-mini{
  font-size:12px;font-weight:700;padding:8px 13px;border-radius:11px;border:1px solid var(--line-strong);
  background:var(--paper-soft);color:var(--ink-light);transition:transform .12s;
}
.btn-mini:active{transform:scale(.96);}

/* ---------- buttons ---------- */
.btn-primary{
  background:var(--ink);color:#fff;border:none;border-radius:15px;
  padding:14px 18px;font-weight:700;font-size:14.5px;width:100%;
  background-image:var(--hero-grad);
  box-shadow:0 8px 20px rgba(108,76,255,.28);
  transition:transform .12s, box-shadow .15s;
}
.btn-primary:active{transform:scale(.98);box-shadow:0 4px 12px rgba(108,76,255,.24);}
.btn-secondary{
  background:var(--paper-card);color:var(--ink);border:1px solid var(--line-strong);border-radius:15px;
  padding:13px 18px;font-weight:700;font-size:14.5px;width:100%;transition:transform .12s, background .15s;
}
.btn-secondary:active{transform:scale(.98);background:var(--paper-soft);}
.btn-danger{color:var(--expense);border-color:rgba(255,77,109,.3);}
.btn-link{background:none;border:none;color:var(--brass);font-weight:700;font-size:13px;padding:6px 0;}

/* ---------- forms ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--text-muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select,.field textarea{
  width:100%;padding:13px 14px;border-radius:13px;border:1.5px solid var(--line-strong);
  background:var(--paper-soft);font-size:15px;color:var(--text);transition:border-color .15s, background .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brass);background:#fff;}
.field-amount input{font-family:var(--font-mono);font-size:23px;font-weight:700;letter-spacing:-.01em;}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px;}
.cat-pill{
  padding:9px 14px;border-radius:999px;border:1.5px solid var(--line-strong);background:var(--paper-soft);
  font-size:12.5px;font-weight:700;color:var(--text);transition:transform .12s;
}
.cat-pill.selected{background:var(--ink);background-image:var(--hero-grad);border-color:transparent;color:#fff;}
.cat-pill:active{transform:scale(.96);}

/* ---------- bottom nav (mobile) ---------- */
.bottom-nav{
  position:fixed;left:12px;right:12px;bottom:14px;z-index:40;
  background:rgba(255,255,255,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid var(--line);border-radius:22px;
  display:flex;justify-content:space-around;padding:8px 6px;
  box-shadow:0 12px 30px rgba(21,18,58,.12);
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--text-muted);font-size:10px;font-weight:700;
  padding:6px 10px;border-radius:14px;flex:1;transition:background .15s, color .15s;
}
.bn-item.active{color:var(--brass);background:var(--brass-soft);}
.bn-item.active svg{color:var(--brass);}

.fab{
  position:fixed;right:18px;bottom:84px;z-index:45;
  width:58px;height:58px;border-radius:18px;border:none;
  background:var(--hero-grad);color:#fff;box-shadow:0 10px 26px rgba(108,76,255,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s;
}
.fab:active{transform:scale(.92);}

@media(min-width:900px){
  .sidebar{display:flex;}
  .bottom-nav{display:none;}
  .fab{bottom:30px;}
  .topbar .mobile-brand{display:none;}
}

/* ---------- modal / sheet ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(21,18,58,.45);backdrop-filter:blur(2px);z-index:60;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.overlay.open{opacity:1;pointer-events:auto;}
@media(min-width:640px){.overlay{align-items:center;}}
.sheet{
  background:var(--paper);width:100%;max-width:480px;max-height:88vh;overflow-y:auto;
  border-radius:24px 24px 0 0;padding:22px 20px calc(24px + env(safe-area-inset-bottom)) 20px;
  transform:translateY(20px);transition:transform .22s cubic-bezier(.2,.8,.2,1);
}
.overlay.open .sheet{transform:translateY(0);}
@media(min-width:640px){.sheet{border-radius:22px;}}
.sheet-handle{width:36px;height:4px;background:var(--line-strong);border-radius:3px;margin:0 auto 16px auto;}
.sheet-title{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--ink);margin-bottom:16px;letter-spacing:-.01em;}

.action-sheet .as-item{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  padding:15px 4px;border:none;background:none;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;color:var(--text);
}
.action-sheet .as-item:last-child{border-bottom:none;}
.as-icon{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ---------- toast ---------- */
.toast{
  position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(10px);
  background:var(--ink);background-image:var(--hero-grad);color:#fff;padding:12px 20px;border-radius:30px;
  font-size:13px;font-weight:700;box-shadow:0 10px 24px rgba(21,18,58,.25);z-index:80;opacity:0;transition:opacity .2s, transform .2s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:900px){.toast{bottom:30px;}}

/* ---------- metrics ---------- */
.chart-card{padding:18px;}
.chart-card .ct{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:12px;letter-spacing:-.01em;}
.chart-wrap{position:relative;height:230px;}
.legend-list{margin-top:10px;}
.legend-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:12.5px;}
.legend-row .l-left{display:flex;align-items:center;gap:8px;color:var(--text);font-weight:500;}
.legend-row .l-amt{font-family:var(--font-mono);font-weight:700;}
.bar-track{height:6px;background:var(--paper-soft);border-radius:4px;margin-top:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}

.period-tabs{display:flex;gap:4px;margin-bottom:14px;background:var(--paper-soft);padding:4px;border-radius:14px;}
.period-tabs button{
  flex:1;padding:9px 4px;border-radius:11px;border:none;background:transparent;
  font-size:12px;font-weight:700;color:var(--text-muted);transition:background .15s, color .15s;
}
.period-tabs button.active{background:var(--paper-card);color:var(--ink);box-shadow:var(--shadow);}

.danger-zone{border:1px solid rgba(255,77,109,.25);background:rgba(255,77,109,.05);}
.help-text{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:6px;}
hr.div{border:none;border-top:1px solid var(--line);margin:18px 0;}
.switch-row{display:flex;align-items:center;justify-content:space-between;}
.switch{position:relative;width:46px;height:26px;border-radius:13px;background:var(--line-strong);border:none;flex-shrink:0;transition:background .15s;}
.switch.on{background:var(--income);}
.switch .knob{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch.on .knob{left:22px;}

/* ---------- auth screen ---------- */
.auth-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;background:var(--hero-grad);
}
.auth-card{
  width:100%;max-width:380px;background:var(--paper-card);border-radius:24px;
  padding:32px 26px;box-shadow:0 20px 50px rgba(21,18,58,.35);animation:popIn .3s ease both;
}
.auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:26px;}
.auth-brand .mark{width:36px;height:36px;border-radius:11px;background:var(--hero-grad);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--font-display);font-weight:700;font-size:16px;}
.auth-brand span:last-child{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--ink);}
.auth-title{font-family:var(--font-display);font-size:21px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.01em;}
.auth-sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.5;}
.auth-error{background:rgba(255,77,109,.08);border:1px solid rgba(255,77,109,.25);color:var(--expense);font-size:12.5px;font-weight:600;padding:10px 13px;border-radius:11px;margin-bottom:14px;}
.auth-switch{text-align:center;font-size:13px;color:var(--text-muted);margin-top:18px;}
.auth-switch button{background:none;border:none;color:var(--brass);font-weight:700;font-size:13px;}
.auth-loading{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--hero-grad);color:#fff;font-family:var(--font-display);font-weight:600;}
</style>
</head>
<body>
<div id="auth-root" style="display:none;"></div>
<div id="app" style="display:none;">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-col">
    <div class="topbar">
      <div class="mobile-brand"><span class="mark">N</span>Nomo</div>
      <div id="topbar-greet"></div>
      <button class="icon-btn" id="settings-btn" aria-label="Ajustes"></button>
    </div>
    <main id="view-root"></main>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav" style="display:none;"></nav>
<button class="fab" id="fab-btn" aria-label="Agregar" style="display:none;"></button>
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script type="module">

/* ============================== FIRESTORE DATA LAYER ============================== */
function userCol(name){ return collection(db, 'users', currentUser.uid, name); }
function userDoc(name, id){ return doc(db, 'users', currentUser.uid, name, id); }
function userMetaDoc(name){ return doc(db, 'users', currentUser.uid, 'meta', name); }

async function saveRecord(collectionName, record){
  await setDoc(userDoc(collectionName, record.id), record);
}
async function removeRecord(collectionName, id){
  await deleteDoc(userDoc(collectionName, id));
}
async function saveCategories(list){
  await setDoc(userMetaDoc('categories'), { list });
}

let unsubscribers = [];
function startListeners(){
  stopListeners();
  ['accounts','expenses','investments','balances','incomes'].forEach(name=>{
    const unsub = onSnapshot(userCol(name), (snap)=>{
      state[name] = snap.docs.map(d=>d.data());
      renderAll();
    }, (err)=>{ console.error('Error de sincronización en '+name, err); });
    unsubscribers.push(unsub);
  });
  const catUnsub = onSnapshot(userMetaDoc('categories'), (snap)=>{
    state.categories = (snap.exists() && snap.data().list && snap.data().list.length) ? snap.data().list : DEFAULT_CATEGORIES.slice();
    renderAll();
  }, (err)=>{ console.error('Error de categorías', err); });
  unsubscribers.push(catUnsub);
  const profileUnsub = onSnapshot(userMetaDoc('profile'), (snap)=>{
    state.userProfile = snap.exists() ? snap.data() : { nombre:'', apellido:'', telefono:'' };
    renderAll();
  }, (err)=>{ console.error('Error de perfil', err); });
  unsubscribers.push(profileUnsub);
}
function stopListeners(){
  unsubscribers.forEach(u=>u());
  unsubscribers = [];
}

async function maybeOfferLocalImport(){
  try{
    if(localStorage.getItem('nomo:importOffered')) return;
    localStorage.setItem('nomo:importOffered','1');
    const get = (k)=>{ try{ return JSON.parse(localStorage.getItem('libreta:'+k)||'[]'); }catch(e){ return []; } };
    const localAccounts = get('accounts'), localExpenses = get('expenses'), localInvestments = get('investments'), localBalances = get('balances');
    const hasLocal = localAccounts.length || localExpenses.length || localInvestments.length || localBalances.length;
    if(!hasLocal) return;
    if(!confirm('Encontramos datos guardados en este dispositivo de una versión anterior. ¿Querés importarlos a tu cuenta nueva?')) return;
    for(const a of localAccounts) await saveRecord('accounts', a);
    for(const e of localExpenses) await saveRecord('expenses', e);
    for(const i of localInvestments) await saveRecord('investments', i);
    for(const b of localBalances) await saveRecord('balances', b);
    const localCats = JSON.parse(localStorage.getItem('libreta:categories')||'[]');
    if(localCats.length) await saveCategories(localCats);
    showToast('Datos importados');
  }catch(e){ console.error('Error importando datos locales', e); }
}

async function handleAuthSubmit(){
  const email = (document.getElementById('auth-email').value||'').trim();
  const password = document.getElementById('auth-password').value||'';
  if(!email || !password){ authError = 'Completá email y contraseña.'; renderAuthScreen(); return; }
  authError = '';
  const btn = document.getElementById('auth-submit');
  btn.textContent = 'Un momento...';
  try{
    if(authMode==='login'){
      await signInWithEmailAndPassword(auth, email, password);
    } else {
      const nombre = (document.getElementById('auth-nombre')||{}).value||'';
      const apellido = (document.getElementById('auth-apellido')||{}).value||'';
      const telefono = (document.getElementById('auth-telefono')||{}).value||'';
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db,'users',cred.user.uid,'meta','profile'), { nombre, apellido, telefono });
    }
  }catch(err){
    authError = translateAuthError(err.code);
    renderAuthScreen();
  }
}

async function handleForgotPassword(){
  const email = (document.getElementById('auth-email').value||'').trim();
  if(!email){ authError = 'Ingresá tu email arriba primero.'; renderAuthScreen(); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    authError = '';
    renderAuthScreen();
    showToast('Te enviamos un email para restablecer tu contraseña');
  }catch(err){
    authError = translateAuthError(err.code);
    renderAuthScreen();
  }
}

function translateAuthError(code){
  const map = {
    'auth/invalid-email': 'El email no es válido.',
    'auth/user-not-found': 'No existe una cuenta con ese email.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Email o contraseña incorrectos.',
    'auth/email-already-in-use': 'Ya existe una cuenta con ese email.',
    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
    'auth/too-many-requests': 'Demasiados intentos. Probá de nuevo en unos minutos.',
  };
  return map[code] || 'Ocurrió un error. Intentá de nuevo.';
}

/* ============================== UTILS ============================== */
function formatMoney(amount, currency){
  currency = currency || 'UYU';
  const opts = currency==='USD' ? {minimumFractionDigits:2,maximumFractionDigits:2} : {minimumFractionDigits:0,maximumFractionDigits:0};
  try{ return new Intl.NumberFormat('es-UY',{style:'currency',currency,...opts}).format(amount); }
  catch(e){ return currency+' '+Number(amount).toFixed(2); }
}
function parseMoney(str){ return parseFloat(String(str||'').replace(',','.')); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function formatDate(iso){
  try{ return new Date(iso+'T00:00:00').toLocaleDateString('es-UY',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e){ return iso; }
}
function monthKey(iso){ return (iso||'').slice(0,7); }
function thisMonthKey(){ return todayISO().slice(0,7); }
function lastMonthKey(){ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }
function accountById(id){ return state.accounts.find(a=>a.id===id); }
function accountLabel(a){ return a ? a.name : '—'; }
function initials(str){ return (str||'?').trim().slice(0,1).toUpperCase(); }
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function currenciesInUse(){
  const set = new Set();
  state.accounts.forEach(a=>set.add(a.currency));
  state.expenses.forEach(e=>set.add(e.currency));
  state.investments.forEach(i=>set.add(i.currency));
  state.balances.forEach(b=>set.add(b.currency));
  if(set.size===0) set.add('UYU');
  return Array.from(set);
}

function daysBetween(d1,d2){ return Math.max(0,(new Date(d2+'T00:00:00') - new Date(d1+'T00:00:00')) / 86400000); }
function investAmount(i){ return Number(i.quantity||0) * Number(i.unitPrice||0); }
function investTotalInvested(i){ return investAmount(i) + Number(i.commission||0); }
function investMetrics(i){
  const totalInvested = investTotalInvested(i);
  if(i.status==='closed'){
    const grossClose = Number(i.quantity||0) * Number(i.closeUnitPrice||0);
    const netProceeds = grossClose - Number(i.closeCommission||0);
    const netResult = netProceeds - totalInvested;
    const returnPct = totalInvested? (netResult/totalInvested*100) : 0;
    const days = daysBetween(i.date, i.closeDate);
    const years = days/365.25;
    let annualized = null;
    if(years>0 && totalInvested>0 && netProceeds>0){
      annualized = (Math.pow(netProceeds/totalInvested, 1/years)-1)*100;
    }
    return { totalInvested, grossClose, netProceeds, netResult, returnPct, annualized, days };
  }
  return { totalInvested, amount: investAmount(i) };
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ============================== RESUMEN ============================== */
function renderResumen(){
  if(state.accounts.length===0){
    return emptyState('vault','Empezá creando una cuenta','Registrá tus cuentas bancarias, tarjetas o efectivo para empezar a llevar tus finanzas.', 'Crear mi primera cuenta','open-account-form');
  }
  const currs = currenciesInUse();
  const mKey = thisMonthKey();

  const patrimonioRows = currs.map(c=>{
    const accSum = state.accounts.filter(a=>a.currency===c).reduce((s,a)=>s+latestBalance(a.id),0);
    const invSum = state.investments.filter(i=>i.currency===c && i.status!=='closed').reduce((s,i)=>s+investAmount(i),0);
    return `<div class="stat-row"><span class="stat-currency">${c}</span><span class="stat-amount">${formatMoney(accSum+invSum,c)}</span></div>`;
  }).join('');

  const gastoRows = currs.map(c=>{
    const total = state.expenses.filter(e=>e.currency===c && monthKey(e.date)===mKey).reduce((s,e)=>s+Number(e.amount),0);
    return `<div class="stat-row"><span class="stat-currency">${c}</span><span class="stat-amount neg">${formatMoney(total,c)}</span></div>`;
  }).join('');

  const movimientos = allMovements().slice(0,6);

  document.getElementById('view-root').innerHTML = `
    <div class="grid-2">
      <div class="card stat-card"><div class="stat-label">Patrimonio</div>${patrimonioRows}</div>
      <div class="card stat-card"><div class="stat-label">Gastos · este mes</div>${gastoRows}</div>
    </div>
    <div class="quick-actions">
      <button class="qa-btn" data-quick="expense">${icon('receipt')}Gasto</button>
      <button class="qa-btn" data-quick="income">${icon('trend')}Ingreso</button>
      <button class="qa-btn" data-quick="investment">${icon('invest')}Inversión</button>
      <button class="qa-btn" data-quick="balance">${icon('vault')}Saldo</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="section-title" style="margin-bottom:0;">Últimos movimientos</div>
      <button class="btn-link" id="go-all-movs">Ir a todos los movimientos</button>
    </div>
    <div class="card">
      ${movimientos.length? movimientos.map(m=>renderMovementRow(m,true)).join('') : `<div style="padding:18px 4px;color:var(--text-muted);font-size:13.5px;">Todavía no registraste movimientos.</div>`}
    </div>
  `;
  document.querySelectorAll('[data-quick]').forEach(el=>el.addEventListener('click',()=>{
    if(el.dataset.quick==='expense') openExpenseForm();
    if(el.dataset.quick==='income') openIncomeForm();
    if(el.dataset.quick==='investment') openInvestmentForm();
    if(el.dataset.quick==='balance') openBalanceForm();
  }));
  document.getElementById('go-all-movs').addEventListener('click', ()=>{ state.view='movimientos'; renderAll(); });
  document.getElementById('view-root').querySelectorAll('[data-open-account]').forEach(el=>el.addEventListener('click', openAccountForm));
  bindMovementClicks(document.getElementById('view-root'));
}

function allMovements(){
  return [
    ...state.expenses.map(e=>({...e,_type:'expense'})),
    ...state.incomes.map(i=>({...i,_type:'income'})),
    ...state.investments.map(i=>({...i,_type:'investment', date:i.date, amount:investAmount(i)})),
    ...state.balances.map(b=>({...b,_type:'balance', amount:b.balance})),
  ].sort((a,b)=> b.date.localeCompare(a.date) || (b.createdAt||0)-(a.createdAt||0));
}

function renderMovementRow(m, clickable=false){
  const editAttr = clickable ? `data-edit-mov="${m._type}:${m.id}" style="cursor:pointer;"` : '';
  if(m._type==='expense'){
    const acc = accountById(m.accountId);
    return `<div class="ledger-row" ${editAttr}>
      <div class="stamp" style="color:${colorFor(m.category,state.categories)}">${initials(m.category)}</div>
      <div class="ledger-main"><div class="ledger-title">${escapeHtml(m.category)}</div><div class="ledger-sub">${accountLabel(acc)} · ${formatDate(m.date)}</div></div>
      <div class="ledger-amount neg">−${formatMoney(m.amount,m.currency)}</div>
    </div>`;
  }
  if(m._type==='income'){
    const acc = accountById(m.accountId);
    return `<div class="ledger-row" ${editAttr}>

      <div class="stamp" style="color:var(--income)">${initials(m.name)}</div>
      <div class="ledger-main"><div class="ledger-title">${escapeHtml(m.name)}</div><div class="ledger-sub">${m.invType||''} · ${formatDate(m.date)}</div></div>
      <div class="ledger-amount pos">${formatMoney(m.amount,m.currency)}</div>
    </div>`;
  }
  const acc = accountById(m.accountId);
  return `<div class="ledger-row" ${editAttr}>
    <div class="stamp" style="color:var(--ink-light)">${icon('vault')}</div>
    <div class="ledger-main"><div class="ledger-title">Saldo · ${accountLabel(acc)}</div><div class="ledger-sub">${formatDate(m.date)}</div></div>
    <div class="ledger-amount">${formatMoney(m.amount,m.currency)}</div>
  </div>`;
}

function latestBalance(accountId){
  const bals = state.balances.filter(b=>b.accountId===accountId).sort((a,b)=>a.date.localeCompare(b.date));
  if(!bals.length) return 0;
  const base = bals[bals.length-1];
  const baseDate = base.date;
  const baseAmount = Number(base.balance);
  // sumar ingresos posteriores al saldo base
  const incomesAfter = state.incomes.filter(i=>i.accountId===accountId && i.date>=baseDate).reduce((s,i)=>s+Number(i.amount),0);
  // restar gastos posteriores al saldo base
  const expensesAfter = state.expenses.filter(e=>e.accountId===accountId && e.date>=baseDate).reduce((s,e)=>s+Number(e.amount),0);
  return baseAmount + incomesAfter - expensesAfter;
}

async function deleteAccount(id){
  const expCount = state.expenses.filter(e=>e.accountId===id).length;
  const invCount = state.investments.filter(i=>i.accountId===id).length;
  const balCount = state.balances.filter(b=>b.accountId===id).length;
  const incCount = state.incomes.filter(i=>i.accountId===id).length;
  const total = expCount + invCount + balCount + incCount;
  const msg = total>0
    ? `Esta cuenta tiene ${total} movimiento(s) asociado(s). Si la eliminás, se van a borrar también todos esos registros. ¿Confirmás?`
    : '¿Eliminar esta cuenta?';
  if(!confirm(msg)) return;
  if(total>0 && !confirm('Confirmá nuevamente: se borrarán la cuenta y todos sus movimientos.')) return;
  showToast('Eliminando...');
  for(const e of state.expenses.filter(e=>e.accountId===id)) await removeRecord('expenses',e.id);
  for(const i of state.investments.filter(i=>i.accountId===id)) await removeRecord('investments',i.id);
  for(const b of state.balances.filter(b=>b.accountId===id)) await removeRecord('balances',b.id);
  for(const i of state.incomes.filter(i=>i.accountId===id)) await removeRecord('incomes',i.id);
  await removeRecord('accounts', id);
  showToast('Cuenta eliminada');
}

/* ============================== MÉTRICAS ============================== */
let chartRegistry = {};
function destroyChart(id){ if(chartRegistry[id]){ chartRegistry[id].destroy(); delete chartRegistry[id]; } }

function periodRange(p){
  const now = new Date();
  if(p==='this'){ return [thisMonthKey(), thisMonthKey()]; }
  if(p==='last'){ return [lastMonthKey(), lastMonthKey()]; }
  if(p==='3m'){ const d=new Date(); d.setMonth(d.getMonth()-2); return [d.toISOString().slice(0,7), thisMonthKey()]; }
  return [null,null];
}
function inPeriod(dateStr, p){
  if(p==='all') return true;
  const [a,b] = periodRange(p);
  const mk = monthKey(dateStr);
  return mk>=a && mk<=b;
}

  const legendAvg = document.getElementById('legend-avg');
  if(catLabels.length){
    legendAvg.innerHTML = catLabels.map(l=>({l, avg: byCat[l]/byCatCount[l], n: byCatCount[l]}))
      .sort((a,b)=>b.avg-a.avg)
      .map(({l,avg,n})=>`<div class="legend-row"><div class="l-left"><span class="cat-dot" style="background:${colorFor(l,state.categories)}"></span>${escapeHtml(l)} <span style="color:var(--text-muted);font-weight:400;">(${n})</span></div><span class="l-amt">${formatMoney(avg,currency)}</span></div>`).join('');
  } else {
    legendAvg.innerHTML = `<div class="help-text">Sin gastos en este período.</div>`;
  }

  try{
    destroyChart('cat');
    if(catLabels.length){
      chartRegistry['cat'] = new Chart(document.getElementById('chart-cat'), {
        type:'doughnut',
        data:{ labels:catLabels, datasets:[{ data:catData, backgroundColor:catLabels.map(l=>colorFor(l,state.categories)), borderWidth:0 }]},
        options:{ plugins:{legend:{display:false}}, cutout:'62%' }
      });
      document.getElementById('legend-cat').innerHTML = catLabels
        .map((l,idx)=>({l,v:catData[idx]})).sort((a,b)=>b.v-a.v)
        .map(({l,v})=>`<div class="legend-row"><div class="l-left"><span class="cat-dot" style="background:${colorFor(l,state.categories)}"></span>${escapeHtml(l)}</div><span class="l-amt">${formatMoney(v,currency)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v/catTotal*100).toFixed(1)}%;background:${colorFor(l,state.categories)}"></div></div>`).join('');
    } else { document.getElementById('legend-cat').innerHTML = `<div class="help-text">Sin gastos en este período.</div>`; }
  }catch(err){ console.error('Error en gráfico de categorías:', err); }

  try{
    const byAcc = {};
    expFiltered.forEach(e=>{ const a=accountById(e.accountId); const name=a?a.name:'—'; byAcc[name]=(byAcc[name]||0)+Number(e.amount); });
    destroyChart('acc');
    if(Object.keys(byAcc).length){
      chartRegistry['acc'] = new Chart(document.getElementById('chart-acc'), {
        type:'bar',
        data:{ labels:Object.keys(byAcc), datasets:[{ data:Object.values(byAcc), backgroundColor:'#6C4CFF', borderRadius:6, maxBarThickness:28 }]},
        options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{grid:{color:'rgba(21,18,58,.06)'}},y:{grid:{display:false}}} }
      });
    }
  }catch(err){ console.error('Error en gráfico por cuenta:', err); }

  try{
    // 6-month trend
    const months = [];
    for(let k=5;k>=0;k--){ const d=new Date(); d.setMonth(d.getMonth()-k); months.push(d.toISOString().slice(0,7)); }
    const trendData = months.map(m=> state.expenses.filter(e=>e.currency===currency && monthKey(e.date)===m).reduce((s,e)=>s+Number(e.amount),0));
    destroyChart('trend');
    chartRegistry['trend'] = new Chart(document.getElementById('chart-trend'), {
      type:'line',
      data:{ labels:months.map(m=>m.slice(5)+'/'+m.slice(2,4)), datasets:[{ data:trendData, borderColor:'#6C4CFF', backgroundColor:'rgba(108,76,255,.12)', fill:true, tension:.35, pointRadius:3 }]},
      options:{ plugins:{legend:{display:false}}, scales:{y:{grid:{color:'rgba(21,18,58,.06)'}},x:{grid:{display:false}}} }
    });
  }catch(err){ console.error('Error en gráfico de evolución:', err); }

  try{
    if(state.investments.length){
      const openInCurrency = state.investments.filter(i=>i.currency===currency && i.status!=='closed');
      const byType = {};
      openInCurrency.forEach(i=>{ byType[i.invType]=(byType[i.invType]||0)+investAmount(i); });
      const invTotal = Object.values(byType).reduce((a,b)=>a+b,0) || 1;
      destroyChart('inv');
      const legendInv = document.getElementById('legend-inv');
      if(Object.keys(byType).length){
        chartRegistry['inv'] = new Chart(document.getElementById('chart-inv'), {
          type:'doughnut',
          data:{ labels:Object.keys(byType), datasets:[{ data:Object.values(byType), backgroundColor:Object.keys(byType).map(l=>colorFor(l,INVESTMENT_TYPES)), borderWidth:0 }]},
          options:{ cutout:'62%', plugins:{legend:{display:false}} }
        });
        if(legendInv) legendInv.innerHTML = Object.entries(byType).sort((a,b)=>b[1]-a[1])
          .map(([l,v])=>`<div class="legend-row"><div class="l-left"><span class="cat-dot" style="background:${colorFor(l,INVESTMENT_TYPES)}"></span>${escapeHtml(l)}</div><span class="l-amt">${formatMoney(v,currency)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${(v/invTotal*100).toFixed(1)}%;background:${colorFor(l,INVESTMENT_TYPES)}"></div></div>`).join('');
      } else if(legendInv) {
        const closedCount = state.investments.filter(i=>i.currency===currency && i.status==='closed').length;
        legendInv.innerHTML = `<div class="help-text">No tenés posiciones abiertas en ${currency}${closedCount?` (sí tenés ${closedCount} cerrada${closedCount>1?'s':''} en esta moneda).`:'.'}</div>`;
      }
    }
  }catch(err){ console.error('Error en gráfico de inversiones:', err); }

  try{
    if(state.balances.length){
      const accIds = Array.from(new Set(state.balances.map(b=>b.accountId)));
      const allDates = Array.from(new Set(state.balances.map(b=>b.date))).sort();
      destroyChart('bal');
      chartRegistry['bal'] = new Chart(document.getElementById('chart-bal'), {
        type:'line',
        data:{ labels:allDates.map(formatDate), datasets:accIds.map((id,idx)=>{
          const acc = accountById(id);
          const series = allDates.map(d=>{
            const recs = state.balances.filter(b=>b.accountId===id && b.date<=d).sort((a,b)=>a.date.localeCompare(b.date));
            return recs.length? Number(recs[recs.length-1].balance) : null;
          });
          return { label:acc?acc.name:'—', data:series, borderColor:PALETTE[idx%PALETTE.length], backgroundColor:'transparent', tension:.3, spanGaps:true };
        })},
        options:{ plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}}}, scales:{y:{grid:{color:'rgba(21,18,58,.06)'}},x:{grid:{display:false}}} }
      });
    }
  }catch(err){ console.error('Error en gráfico de saldos:', err); }
}

async function addCategory(){
  const input = document.getElementById('new-cat');
  const v = input.value.trim();
  if(!v) return;
  if(state.categories.includes(v)){ showToast('Esa categoría ya existe'); return; }
  await saveCategories([...state.categories, v]);
}
async function removeCategory(c){
  const used = state.expenses.some(e=>e.category===c);
  if(used){ showToast('No se puede borrar: tiene gastos asociados'); return; }
  await saveCategories(state.categories.filter(x=>x!==c));
}
function toCSV(rows, headers){
  const esc = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
  return [headers.join(','), ...rows.map(r=>headers.map(h=>esc(r[h])).join(','))].join('\n');
}
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
function exportCSV(type){
  let rows, headers, name;
  if(type==='expenses'){ headers=['date','category','accountId','amount','currency','note']; rows=state.expenses.map(e=>({...e, accountId: accountLabel(accountById(e.accountId))})); name='gastos.csv'; }
  if(type==='investments'){
    headers=['date','name','invType','accountId','quantity','unitPrice','amountInvested','commission','totalInvested','currency','status','closeDate','closeUnitPrice','grossClose','closeCommission','netResult','returnPct','annualizedReturn'];
    rows=state.investments.map(i=>{ const m=investMetrics(i); return {
      ...i, accountId: accountLabel(accountById(i.accountId)),
      amountInvested: investAmount(i).toFixed(2),
      totalInvested: investTotalInvested(i).toFixed(2),
      status: i.status||'open',
      grossClose: i.status==='closed' ? m.grossClose.toFixed(2) : '',
      netResult: i.status==='closed' ? m.netResult.toFixed(2) : '',
      returnPct: i.status==='closed' ? m.returnPct.toFixed(2) : '',
      annualizedReturn: (i.status==='closed' && m.annualized!=null) ? m.annualized.toFixed(2) : ''
    };});
    name='inversiones.csv';
  }
  if(type==='balances'){ headers=['date','accountId','balance','currency']; rows=state.balances.map(b=>({...b, accountId: accountLabel(accountById(b.accountId))})); name='saldos.csv'; }
  downloadFile(name, toCSV(rows, headers), 'text/csv;charset=utf-8;');
  showToast('Archivo exportado');
}
async function wipeData(){
  if(!confirm('Esta acción borra todo. ¿Confirmás?')) return;
  if(!confirm('Confirmá nuevamente: se eliminarán todos los gastos, inversiones, saldos y cuentas.')) return;
  showToast('Borrando...');
  for(const colName of ['accounts','expenses','investments','balances','incomes']){
    const snap = await getDocs(userCol(colName));
    for(const d of snap.docs){ await deleteDoc(d.ref); }
  }
  state.view='resumen';
  showToast('Datos eliminados');
}

function openOverlay(html, onOpen, fullSheet=false){
  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `<div class="sheet-handle"></div>${html}`;
  if(fullSheet) sheet.style.maxHeight='95vh';
  else sheet.style.maxHeight='';
  overlay.classList.add('open');
  overlay.onclick = (e)=>{ if(e.target===overlay) closeOverlay(); };
  if(onOpen) onOpen();
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('open'); }

    <div class="help-text" id="i-total-display" style="margin:-6px 0 14px 0;font-family:var(--font-mono);font-weight:600;color:var(--ink);">Valor total invertido: ${formatMoney(existing?investTotalInvested(existing):0, defaultCurrency)}</div>
    <div class="field-row">
      <div class="field"><label>Cuenta</label><select id="i-account-sel" ${isClosed?'disabled':''}>${state.accounts.map(a=>`<option value="${a.id}" ${existing&&existing.accountId===a.id?'selected':''}>${escapeHtml(a.name)} (${a.currency})</option>`).join('')}</select></div>
      <div class="field"><label>Moneda</label><select id="i-currency-sel" ${isClosed?'disabled':''}>${CURRENCIES.map(c=>`<option ${defaultCurrency===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Fecha de apertura</label><input type="date" id="i-date" value="${existing?existing.date:todayISO()}" ${isClosed?'disabled':''}></div>

    ${isClosed?`
      <hr class="div">
      <div class="section-title" style="margin-top:0;">Resultado del cierre</div>
      <div class="stat-row"><span class="stat-currency">Fecha de cierre</span><span class="stat-amount" style="font-size:14px;">${formatDate(existing.closeDate)}</span></div>
      <div class="stat-row"><span class="stat-currency">Precio de venta (por unidad)</span><span class="stat-amount" style="font-size:14px;">${formatMoney(existing.closeUnitPrice, existing.currency)}</span></div>
      <div class="stat-row"><span class="stat-currency">Valor bruto de venta</span><span class="stat-amount" style="font-size:14px;">${formatMoney(m.grossClose, existing.currency)}</span></div>
      <div class="stat-row"><span class="stat-currency">Comisión de cierre</span><span class="stat-amount" style="font-size:14px;">${formatMoney(existing.closeCommission||0, existing.currency)}</span></div>
      <div class="stat-row"><span class="stat-currency">Resultado neto</span><span class="stat-amount ${m.netResult<0?'neg':''}">${formatMoney(m.netResult, existing.currency)}</span></div>
      <div class="stat-row"><span class="stat-currency">Rentabilidad neta total</span><span class="stat-amount" style="font-size:14px;">${m.returnPct.toFixed(1)}%</span></div>
      <div class="stat-row"><span class="stat-currency">Rentabilidad neta anualizada (CAGR)</span><span class="stat-amount" style="font-size:14px;">${m.annualized!=null? m.annualized.toFixed(1)+'%' : '— (no anualizable)'}</span></div>
    `:''}

    ${!isClosed?`<button class="btn-primary" id="save-inv">${isEdit?'Guardar cambios':'Registrar inversión'}</button>`:''}
    ${isEdit && !isClosed?`<button class="btn-secondary" id="close-inv-btn" style="margin-top:10px;">Cerrar posición</button>`:''}
    ${isEdit && isClosed?`<button class="btn-secondary" id="reopen-inv-btn" style="margin-top:10px;">Reabrir posición</button>`:''}
    ${isEdit?`<button class="btn-secondary btn-danger" id="del-inv-btn" style="margin-top:10px;">Eliminar</button>`:''}
  `, ()=>{
    function updateTotalDisplay(){
      const qty = parseMoney(document.getElementById('i-qty').value)||0;
      const price = parseMoney(document.getElementById('i-price').value)||0;
      const comm = parseMoney(document.getElementById('i-commission').value)||0;
      const curr = document.getElementById('i-currency-sel') ? document.getElementById('i-currency-sel').value : defaultCurrency;
      const amount = qty*price;
      document.getElementById('i-amount-display').textContent = 'Valor de mercado: ' + formatMoney(amount, curr);
      document.getElementById('i-total-display').textContent = 'Valor total invertido: ' + formatMoney(amount+comm, curr);
    }
    if(!isClosed){
      document.getElementById('i-qty').addEventListener('input', updateTotalDisplay);
      document.getElementById('i-price').addEventListener('input', updateTotalDisplay);
      document.getElementById('i-commission').addEventListener('input', updateTotalDisplay);
      document.getElementById('i-currency-sel').addEventListener('change', updateTotalDisplay);
      document.getElementById('save-inv').addEventListener('click', async ()=>{
        const quantity = parseMoney(document.getElementById('i-qty').value);
        const unitPrice = parseMoney(document.getElementById('i-price').value);
        if(!quantity || quantity<=0){ showToast('Ingresá una cantidad válida'); return; }
        if(!unitPrice || unitPrice<=0){ showToast('Ingresá un precio de compra válido'); return; }
        const commission = parseMoney(document.getElementById('i-commission').value)||0;
        const name = document.getElementById('i-name').value.trim();
        if(!name){ showToast('Ingresá un nombre'); return; }
        const accountId = document.getElementById('i-account-sel').value;
        const currency = document.getElementById('i-currency-sel').value;
        const record = {
          ...(existing||{}),
          id: existing? existing.id : uid(),
          createdAt: existing? (existing.createdAt||Date.now()) : Date.now(),
          date: document.getElementById('i-date').value || todayISO(),
          name, invType: document.getElementById('i-type').value,
          accountId, quantity, unitPrice, commission, currency,
          status: existing? (existing.status||'open') : 'open'
        };
        if(isEdit){ const idx=state.investments.findIndex(x=>x.id===existing.id); state.investments[idx]=record; }
        else state.investments.push(record);
        await saveRecord('investments', record);
        closeOverlay(); renderAll(); showToast(isEdit?'Inversión actualizada':'Inversión registrada');
      });
    }
    if(isEdit && !isClosed) document.getElementById('close-inv-btn').addEventListener('click', ()=>{ openClosePositionForm(existing); });
    if(isEdit && isClosed) document.getElementById('reopen-inv-btn').addEventListener('click', async ()=>{
      if(!confirm('¿Reabrir esta posición? Se van a borrar los datos de cierre.')) return;
      const idx=state.investments.findIndex(x=>x.id===existing.id);
      const rec = {...state.investments[idx], status:'open'};
      delete rec.closeDate; delete rec.closeUnitPrice; delete rec.closeCommission;
      state.investments[idx]=rec;
      await saveRecord('investments', rec);
      closeOverlay(); renderAll(); showToast('Posición reabierta');
    });
    if(isEdit) document.getElementById('del-inv-btn').addEventListener('click', ()=>{ closeOverlay(); deleteRecord('investments', existing.id); });
  });
}

function openClosePositionForm(existing){
  openOverlay(`
    <div class="sheet-title">Cerrar posición</div>
    <div class="help-text" style="margin-bottom:14px;">${escapeHtml(existing.name)} · ${existing.quantity} unidades · Valor total invertido: ${formatMoney(investTotalInvested(existing), existing.currency)}</div>
    <div class="field"><label>Fecha de cierre</label><input type="date" id="c-date" value="${todayISO()}"></div>
    <div class="field"><label>Precio de venta (por unidad)</label><input type="text" inputmode="decimal" id="c-price" placeholder="0"></div>
    <div class="help-text" id="c-gross-display" style="margin:-6px 0 14px 0;font-family:var(--font-mono);">Valor bruto de venta: ${formatMoney(0, existing.currency)}</div>
    <div class="field"><label>Comisión total de cierre</label><input type="text" inputmode="decimal" id="c-commission" placeholder="0"></div>
    <div class="help-text" id="c-preview" style="font-family:var(--font-mono);"></div>
    <button class="btn-primary" id="confirm-close" style="margin-top:14px;">Confirmar cierre</button>
  `, ()=>{
    function preview(){
      const cp = parseMoney(document.getElementById('c-price').value)||0;
      const cc = parseMoney(document.getElementById('c-commission').value)||0;
      const cd = document.getElementById('c-date').value || todayISO();
      const gross = Number(existing.quantity||0) * cp;
      document.getElementById('c-gross-display').textContent = 'Valor bruto de venta: ' + formatMoney(gross, existing.currency);
      const temp = {...existing, status:'closed', closeDate:cd, closeUnitPrice:cp, closeCommission:cc};
      const m = investMetrics(temp);
      document.getElementById('c-preview').innerHTML = `Resultado neto: ${formatMoney(m.netResult, existing.currency)} (${m.returnPct.toFixed(1)}%)${m.annualized!=null?` · Anualizado: ${m.annualized.toFixed(1)}%`:''}`;
    }
    document.getElementById('c-price').addEventListener('input', preview);
    document.getElementById('c-commission').addEventListener('input', preview);
    document.getElementById('c-date').addEventListener('change', preview);
    document.getElementById('confirm-close').addEventListener('click', async ()=>{
      const closeUnitPrice = parseMoney(document.getElementById('c-price').value);
      if(!closeUnitPrice || closeUnitPrice<=0){ showToast('Ingresá un precio de venta válido'); return; }
      const closeCommission = parseMoney(document.getElementById('c-commission').value)||0;
      const closeDate = document.getElementById('c-date').value || todayISO();
      const idx = state.investments.findIndex(x=>x.id===existing.id);
      const record = {...state.investments[idx], status:'closed', closeDate, closeUnitPrice, closeCommission};
      state.investments[idx] = record;
      await saveRecord('investments', record);
      closeOverlay(); renderAll(); showToast('Posición cerrada');
    });
  });
}

function openBalanceForm(preselectAccountId){
  if(state.accounts.length===0){ closeOverlay(); openAccountForm(); return; }
  const defaultAcc = preselectAccountId ? accountById(preselectAccountId) : state.accounts[0];
  openOverlay(`
    <div class="sheet-title">Registrar saldo</div>
    <div class="field"><label>Cuenta</label><select id="b-account-sel">${state.accounts.map(a=>`<option value="${a.id}" ${preselectAccountId===a.id?'selected':''}>${escapeHtml(a.name)} (${a.currency})</option>`).join('')}</select></div>
    <div class="field-row">
      <div class="field field-amount" style="flex:2;"><label>Saldo actual</label><input type="text" inputmode="decimal" id="b-amount" placeholder="0"></div>
      <div class="field" style="flex:1;"><label>Moneda</label><select id="b-currency-sel">${CURRENCIES.map(c=>`<option ${defaultAcc&&defaultAcc.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="field"><label>Fecha</label><input type="date" id="b-date" value="${todayISO()}"></div>
    <button class="btn-primary" id="save-bal">Guardar saldo</button>
  `, ()=>{
    document.getElementById('save-bal').addEventListener('click', async ()=>{
      const balance = parseMoney(document.getElementById('b-amount').value);
      if(isNaN(balance)){ showToast('Ingresá un saldo válido'); return; }
      const accountId = document.getElementById('b-account-sel').value;
      const currency = document.getElementById('b-currency-sel').value;
      const record = { id: uid(), createdAt: Date.now(), date: document.getElementById('b-date').value || todayISO(), accountId, balance, currency };
      state.balances.push(record);
      await saveRecord('balances', record);
      closeOverlay(); renderAll(); showToast('Saldo registrado');
    });
  });
}

function openAccountForm(){
  openOverlay(`
    <div class="sheet-title">Nueva cuenta</div>
    <div class="field"><label>Nombre</label><input type="text" id="a-name" placeholder="Ej: Cuenta sueldo BROU"></div>
    <div class="field"><label>Banco / entidad (opcional)</label><input type="text" id="a-bank" placeholder="Ej: BROU, Itaú, Santander..."></div>
    <div class="field-row">
      <div class="field"><label>Tipo</label><select id="a-type">${ACCOUNT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="field"><label>Moneda</label><select id="a-curr">${CURRENCIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
    </div>
    <button class="btn-primary" id="save-account">Crear cuenta</button>
  `, ()=>{
    document.getElementById('save-account').addEventListener('click', async ()=>{
      const name = document.getElementById('a-name').value.trim();
      if(!name){ showToast('Ingresá un nombre'); return; }
      const record = { id: uid(), name, bank: document.getElementById('a-bank').value.trim(), type: document.getElementById('a-type').value, currency: document.getElementById('a-curr').value };
      state.accounts.push(record);
      await saveRecord('accounts', record);
      closeOverlay(); renderAll(); showToast('Cuenta creada');
    });
  });
}

async function deleteRecord(key, id){
  if(!confirm('¿Eliminar este registro?')) return;
  state[key] = state[key].filter(x=>x.id!==id);
  await removeRecord(key, id);
  renderAll();
  showToast('Registro eliminado');
}

/* ============================== MAIN RENDER ============================== */
function renderAll(){
  renderNav();
  renderTopbar();
  if(state.view==='resumen') renderResumen();
  else if(state.view==='gastos') renderGastos();
  else if(state.view==='inversiones') renderInversiones();
  else if(state.view==='cuentas') renderCuentas();
  else if(state.view==='metricas') renderMetricas();
  else if(state.view==='movimientos') renderMovimientos();
  else if(state.view==='ajustes') renderAjustes();
  window.scrollTo(0,0);
}

document.getElementById('settings-btn').innerHTML = icon('gear');
document.getElementById('settings-btn').addEventListener('click', ()=>{ state.view='ajustes'; renderAll(); });
document.getElementById('fab-btn').innerHTML = icon('plus');
document.getElementById('fab-btn').addEventListener('click', openFabSheet);

document.getElementById('auth-root').style.display = '';
document.getElementById('auth-root').innerHTML = '<div class="auth-loading">Cargando...</div>';

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    document.getElementById('auth-root').style.display = 'none';
    document.getElementById('auth-root').innerHTML = '';
    document.getElementById('app').style.display = '';
    document.getElementById('bottom-nav').style.display = '';
    document.getElementById('fab-btn').style.display = '';
    await maybeOfferLocalImport();
    startListeners();
    state.view = 'resumen';
    renderAll();
  } else {
    currentUser = null;
    stopListeners();
    document.getElementById('app').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    document.getElementById('fab-btn').style.display = 'none';
    document.getElementById('auth-root').style.display = '';
    renderAuthScreen();
  }
});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
